<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Wiom TV · unserviceable screen — विकल्प</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7" defer></script>
<style>
  :root{
    /* new_app tokens (verified from release/sprint-18 BaseColors/WiomColors) */
    --brand600:#D9008D; --brand500:#FF66C9; --brand300:#FFB2E4; --brand100:#FFE5F6;
    --neutral900:#161021; --neutral700:#665E75; --neutral500:#A7A1B2; --neutral200:#E8E4F0; --neutral100:#F1EDF7;
    --neutralWhite:#FAF9FC; --baseWhite:#FFFFFF;
    --positive600:#008043; --positive100:#E1FAED; --negative600:#E01E00;
    --info600:#6D17CE; --info100:#F1E5FF;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Noto Sans Devanagari',system-ui,sans-serif;background:#2a2d33;color:var(--neutral900);
    display:flex;align-items:flex-start;justify-content:center;}

  /* ===== app viewport: full-screen on mobile, framed on desktop ===== */
  .viewport{position:relative;width:100vw;height:100dvh;background:var(--neutralWhite);overflow:hidden;}
  @media(min-width:520px){
    body{padding:22px 0;}
    .viewport{width:380px;height:812px;border-radius:34px;border:1px solid #0c0a12;
      box-shadow:0 22px 60px rgba(0,0,0,.5);margin:0 auto;}
  }

  /* ===== SELECTION SCREEN ===== */
  .menu{position:absolute;inset:0;overflow-y:auto;padding:52px 18px 28px;background:var(--neutralWhite);}
  .menu .kick{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--brand600);text-transform:uppercase;}
  .menu h1{font-size:22px;font-weight:700;line-height:1.3;margin-top:6px;}
  .menu .sub{font-size:13.5px;color:var(--neutral700);line-height:1.55;margin-top:8px;}
  .cards{margin-top:22px;display:flex;flex-direction:column;gap:14px;}
  .card{position:relative;display:block;width:100%;text-align:left;font-family:inherit;cursor:pointer;
    background:var(--baseWhite);border:1.5px solid var(--neutral200);border-radius:var(--radius);
    padding:16px 16px 14px;transition:border-color .2s, box-shadow .2s;}
  .card:active{border-color:var(--brand300);}
  .card .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .card .nm{font-size:17px;font-weight:700;color:var(--neutral900);}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;}
  .badge.final{background:var(--brand100);color:var(--brand600);}
  .badge.newc{background:var(--info100);color:var(--info600);}
  .badge.base{background:var(--neutral100);color:var(--neutral700);}
  .badge.done{background:var(--positive100);color:var(--positive600);}
  .card .desc{font-size:13px;color:var(--neutral700);line-height:1.55;margin-top:8px;}
  .card .go{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:10px;
    font-size:14px;font-weight:700;color:var(--brand600);}
  .card.viewed{border-color:var(--positive600);}
  .card.viewed .go{color:var(--positive600);}
  .card.next{border-color:var(--brand600);box-shadow:0 0 0 3px var(--brand100);animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px var(--brand100);}50%{box-shadow:0 0 0 7px var(--brand100);}}
  .menu .hint{margin-top:18px;font-size:12px;color:var(--neutral500);text-align:center;line-height:1.5;}
  .alldone{margin-top:18px;background:var(--positive100);border-radius:var(--radius);padding:14px 16px;
    font-size:13.5px;color:var(--positive600);font-weight:600;line-height:1.5;text-align:center;}

  /* ===== VIEW CHROME (floating, while experiencing an option) ===== */
  .exit{position:absolute;top:34px;left:10px;z-index:30;display:inline-flex;align-items:center;gap:5px;
    background:rgba(255,255,255,.9);backdrop-filter:blur(6px);border:1px solid var(--neutral200);border-radius:999px;
    padding:7px 13px;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--neutral900);cursor:pointer;
    box-shadow:0 2px 8px rgba(22,16,33,.10);}
  .exit .b{color:var(--brand600);}
  .nav{position:absolute;top:34px;right:10px;z-index:30;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
  .navseg{display:inline-flex;background:rgba(255,255,255,.88);backdrop-filter:blur(6px);border:1px solid var(--neutral200);
    border-radius:999px;padding:3px;box-shadow:0 2px 8px rgba(22,16,33,.10);}
  .navseg button{font-family:inherit;font-size:12px;font-weight:600;color:var(--neutral700);background:transparent;
    border:0;padding:5px 10px;border-radius:999px;cursor:pointer;}
  .navseg button.on{background:var(--brand600);color:#fff;}

  /* end-of-view prompt: appears after the option has played */
  .nextprompt{position:absolute;top:86px;left:50%;transform:translate(-50%,-14px);z-index:30;opacity:0;
    display:inline-flex;align-items:center;gap:6px;background:var(--neutral900);color:var(--neutralWhite);
    border:0;border-radius:999px;padding:9px 16px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
    box-shadow:0 10px 26px rgba(22,16,33,.35);transition:all .5s cubic-bezier(.2,.8,.25,1);pointer-events:none;white-space:nowrap;}
  .promptin .nextprompt{opacity:1;transform:translate(-50%,0);pointer-events:auto;}
  .nextprompt .b{color:var(--brand300);}
  .vtheatre .nextprompt{top:134px;} /* theatre has a 2-row nav + top-aligned title — keep the prompt clear of both */

  /* ===== live app screen (light StandardWidget) ===== */
  .statusbar{position:absolute;top:0;left:0;right:0;height:30px;display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;font-size:12px;color:var(--neutral900);z-index:6;}
  .statusbar .r{display:flex;gap:6px;align-items:center;}
  .appbar{position:absolute;top:30px;left:0;right:0;height:46px;display:flex;align-items:center;padding:0 10px;z-index:6;}
  .appbar .back{width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--neutral900);}

  .body{position:absolute;top:76px;left:0;right:0;bottom:118px;overflow-y:auto;
    padding:24px 16px 16px;display:flex;flex-direction:column;align-items:center;}
  .body.k2mode{bottom:96px;}
  .gfx{width:240px;height:240px;flex:0 0 auto;}
  @media(max-height:640px){.gfx{width:150px;height:150px;}} /* flex graphic: small phones */
  .gfx img{width:100%;height:100%;object-fit:contain;display:block;}
  .title{margin-top:16px;text-align:center;font-size:20px;font-weight:600;line-height:1.35;color:var(--neutral900);}
  .subtitle{margin-top:16px;text-align:center;font-size:16px;font-weight:400;line-height:1.5;color:var(--neutral900);}

  .addrcard{margin-top:16px;width:100%;display:flex;gap:8px;align-items:flex-start;background:var(--neutralWhite);
    border:1px solid var(--neutral200);border-radius:var(--radius);padding:16px;}
  .addrcard img{width:24px;height:24px;flex:0 0 auto;margin-top:2px;}
  .addrcard .nm{font-size:16px;font-weight:600;color:var(--neutral900);line-height:1.3;}
  .addrcard .ad{font-size:12px;color:var(--neutral700);line-height:1.45;margin-top:8px;}

  /* buttons */
  .pribtn{display:block;width:100%;background:var(--brand500);color:var(--neutral900);font-weight:600;font-size:16px;
    border:0;padding:14px 16px;border-radius:var(--radius);cursor:pointer;font-family:inherit;text-align:center;}
  .pribtn.strong{background:var(--brand600);color:var(--neutralWhite);font-weight:700;}
  .inbody{margin-top:20px;}
  .loginlink{display:flex;align-items:center;justify-content:center;gap:4px;color:var(--neutral900);
    font-size:14px;font-weight:400;padding:12px 0 8px;}
  .loginlink .arr{color:var(--brand600);font-weight:700;}

  /* production pinned bar (Before + Toast) */
  .bottombar{position:absolute;left:0;right:0;bottom:0;z-index:7;background:var(--neutralWhite);
    box-shadow:0 -2px 6px rgba(22,16,33,.12);padding:16px 16px 8px;}

  /* mini TV frame */
  .tvframe{flex:0 0 auto;width:64px;height:48px;border-radius:9px;overflow:hidden;position:relative;background:#000;box-shadow:0 2px 8px rgba(22,16,33,.25);}
  .mosaic{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
  .mosaic span:nth-child(1){background:linear-gradient(135deg,#E01E00,#ff5a3c);}
  .mosaic span:nth-child(2){background:linear-gradient(135deg,#1746a2,#3b82f6);}
  .mosaic span:nth-child(3){background:linear-gradient(135deg,#7a1fa2,#c026d3);}
  .mosaic span:nth-child(4){background:linear-gradient(135deg,#b8860b,#f2c94c);}
  .tvframe .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .tvframe .play b{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.35);}
  .playtri{width:0;height:0;border-style:solid;border-width:4.5px 0 4.5px 7px;border-color:transparent transparent transparent var(--brand600);margin-left:2px;}
  .tvframe .live{position:absolute;top:3px;left:3px;display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.55);color:#fff;font-size:7px;font-weight:700;padding:2px 4px;border-radius:4px;}
  .tvframe .live i{width:4px;height:4px;border-radius:50%;background:var(--negative600);display:block;}

  /* ===== FINAL "टोस्ट" (was D) — snackbar: 1s, "तब तक के लिए", whole toast tappable ===== */
  .snack{position:absolute;left:12px;right:12px;bottom:130px;z-index:22;display:flex;align-items:center;gap:11px;
    background:var(--neutral900);border-radius:15px;padding:11px 13px;box-shadow:0 12px 34px rgba(22,16,33,.4);
    text-decoration:none;transform:translateY(180%);opacity:0;transition:all .5s cubic-bezier(.2,.8,.25,1);}
  .snackin .snack{transform:translateY(0);opacity:1;}
  .snack .qt{flex:1;min-width:0;}
  .snack .slbl{display:block;font-size:10px;font-weight:700;color:var(--brand300);margin-bottom:2px;}
  .snack .qt b{display:block;color:var(--neutralWhite);font-size:14px;font-weight:700;line-height:1.3;}
  .snack .qt span{display:block;color:var(--neutralWhite);opacity:.62;font-size:11px;margin-top:2px;}
  .snack .go{color:var(--brand300);font-weight:700;font-size:13.5px;white-space:nowrap;}
  .snack .x{color:var(--neutralWhite);opacity:.55;font-size:15px;padding:4px 6px;cursor:pointer;}

  /* ===== FINAL "फ़ुटर बटन" (was K2) — strong button up + delayed footer, WHOLE footer tappable ===== */
  .k2bar{position:absolute;left:0;right:0;bottom:0;z-index:7;display:block;background:var(--neutral100);
    border-top:1px solid var(--neutral200);padding:11px 16px 14px;text-decoration:none;cursor:pointer;
    transform:translateY(110%);transition:transform .55s cubic-bezier(.2,.8,.25,1);}
  .k2in .k2bar{transform:none;}
  .k2bar:active{background:var(--neutral200);}
  .k2bar .lbl{font-size:11px;font-weight:700;color:var(--neutral500);margin-bottom:7px;}
  .k2row{display:flex;align-items:center;gap:12px;}
  .k2row .k2t{flex:1;min-width:0;}
  .k2row .k2t b{display:block;font-size:14.5px;font-weight:700;color:var(--neutral900);line-height:1.3;}
  .k2row .k2t span{display:block;font-size:11.5px;color:var(--neutral700);margin-top:2px;}
  .k2row .see{color:var(--brand600);font-weight:700;font-size:14px;white-space:nowrap;}

  /* ===== OPTION 3 "लाइव एम्बेड" — condensed screen (same centered grammar as production, just smaller) + theatre band ===== */
  /* --tvh: video height scales with the real phone viewport (browser bars eat a lot of dvh on iOS) */
  .viewport{--tvh:clamp(118px,20dvh,196px);}
  @media(min-width:520px){.viewport{--tvh:196px;}} /* desktop frame is fixed 812px tall */
  /* PRESENT AT FIRST PAINT: no slide-in, no reflow. The band is whole and final the instant
     the screen appears, so nothing moves while the user is reaching for the primary CTA. */
  .body.tmode{bottom:24px;padding-top:34px;justify-content:flex-start;}
  /* safe centering: auto margins center the group when space allows, collapse to 0 (→ scroll) when it doesn't.
     justify-content:center would clip the TOP on overflow — the exact iPhone bug. */
  .body.tmode > :first-child{margin-top:auto;}
  .body.tmode .loginlink{margin-bottom:auto;}
  .tin .body.tmode{bottom:calc(var(--tvh) + 152px);}
  .gfx.md{width:clamp(84px,13dvh,118px);height:clamp(84px,13dvh,118px);}
  @media(min-width:520px){.gfx.md{width:118px;height:118px;}}
  .title.compact{font-size:18px;margin-top:10px;}
  .subtitle.compact{font-size:13.5px;margin-top:10px;color:var(--neutral700);}
  .body.tmode .addrcard{margin-top:12px;padding:12px 16px;}
  .body.tmode .inbody{margin-top:12px;}
  @media(max-height:760px){
    .title.compact{font-size:17px;}
    .body.tmode .addrcard{padding:10px 14px;}
  }
  .theatre{position:absolute;left:0;right:0;bottom:0;z-index:8;display:block;background:var(--neutral900);
    border-radius:22px 22px 0 0;padding:13px 16px 16px;text-decoration:none;cursor:pointer;
    box-shadow:0 -12px 34px rgba(22,16,33,.35);}
  .theatre .tlabel{font-size:11px;font-weight:700;color:var(--brand300);}
  .theatre .thead{display:flex;align-items:center;gap:8px;margin-top:3px;}
  .theatre .thead b{color:var(--neutralWhite);font-size:16px;font-weight:700;}
  .freepill{font-size:10.5px;font-weight:700;background:var(--brand100);color:var(--brand600);padding:3px 8px;border-radius:999px;}
  .screenwrap{position:relative;width:100%;height:var(--tvh,196px);background:#000;border-radius:12px;overflow:hidden;margin-top:10px;}
  .bubble.prev .screenwrap{height:auto;aspect-ratio:16/9;} /* chat preview keeps its own aspect */
  .screenwrap video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
  .screenwrap .live2{position:absolute;top:8px;left:8px;display:flex;align-items:center;gap:4px;
    background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;}
  .screenwrap .live2 i{width:6px;height:6px;border-radius:50%;background:var(--negative600);display:block;animation:blinklive 1.4s infinite;}
  @keyframes blinklive{0%,100%{opacity:1;}50%{opacity:.35;}}
  .screenwrap .chname{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.55);color:#fff;
    font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;}
  .screenwrap .loadhint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--neutral500);font-size:12px;}
  /* ---- A WINDOW INTO wiom.tv, not the destination itself ----------------------------
     Full-bleed video promises "this channel, now" — a promise wiom.tv cannot keep: it has
     no channel deep-link, and new users land in one of four random genre arms (fse_v2).
     Framed + inset promises "wiom.tv — lots of free live TV", which the landing keeps every
     time. Real stream still plays, so the "it's actually live" proof survives intact. */
  /* LARGE: the preview is the point of this option, so it runs near-full-width. The bezel +
     inset (not the size) is what stops it claiming to BE wiom.tv, so we keep the frame and
     put the breadth line UNDER it rather than stealing width for a side-by-side lockup. */
  .theatre .tstage{display:block;margin-top:10px;}
  .theatre .screenwrap{width:100%;height:auto;aspect-ratio:16/9;margin:0;
    border-radius:12px;border:2px solid #4a4157;box-shadow:0 6px 18px rgba(0,0,0,.45);}
  /* Short viewports: zone 1 has a hard floor (graphic+title+address+CTA+login ≈ 300px), so a
     full-width frame pushes the primary CTA behind the band — measured at 360x640, the
     screenutil design size. Scale the frame by HEIGHT and drop the breadth line (the frame
     already carries that message) so the CTA is never hidden. */
  @media(max-height:720px){
    /* Spend the scarce height on the video, not the decoration: the cartoon is the least
       load-bearing element on this screen, the playing preview is the whole point of the
       option, and the CTA must never go behind the band. So the graphic goes first. */
    .vtheatre .body.tmode{padding-top:14px;}
    .vtheatre .gfx.md{display:none;}
    .theatre{padding:10px 16px 12px;}
    .theatre .screenwrap{width:100%;height:auto;aspect-ratio:16/9;margin:0;}
    .theatre .tmeta{margin-top:6px;}
    .theatre .tcta{margin-top:10px;}
  }
  @media(max-height:640px){
    .theatre .tmeta{display:none;}
    .theatre .screenwrap{width:auto;height:150px;margin:0 auto;}
  }
  @media(max-height:600px){.theatre .screenwrap{height:126px;}}
  .theatre .tmeta{margin-top:8px;display:flex;gap:7px;justify-content:center;
    align-items:baseline;flex-wrap:wrap;}
  .theatre .tmeta b{color:var(--neutralWhite);font-size:14px;font-weight:700;line-height:1.25;}
  .theatre .tmeta span{color:var(--neutral500);font-size:11.5px;line-height:1.35;}

  /* ---- NEVER EMPTY: local poster renders at t=0, stream fades in over it ---------------
     ~29% of stream starts fail in the wild. Without a local first frame that is a black
     box on a production screen. The poster is a wiom.tv-style channel grid, so the "failed"
     state is still a complete, intentional-looking surface — never a spinner, never blank. */
  .theatre .poster{position:absolute;inset:0;display:grid;gap:3px;padding:3px;background:#0d0916;
    grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);}
  .theatre .poster i{display:block;border-radius:3px;background:linear-gradient(135deg,#2a2336,#3b3348);}
  .theatre .poster i:nth-child(2){background:linear-gradient(135deg,#3a2440,#4a2f52);}
  .theatre .poster i:nth-child(4){background:linear-gradient(135deg,#24303f,#2f3f52);}
  .theatre .poster i:nth-child(6){background:linear-gradient(135deg,#3f2a24,#52382f);}
  .theatre .screenwrap video{position:relative;z-index:1;opacity:0;transition:opacity .45s ease;}
  .theatre .screenwrap video.on{opacity:1;}
  .theatre .live2,.theatre .replay{z-index:2;}
  /* "LIVE" only ever appears over something actually live — never over the poster */
  .theatre .live2{display:none;}
  .theatre .screenwrap.playing .live2{display:flex;}

  /* ---- BOUNDED DATA: auto-stop at ~25s, back to poster + replay ----------------------- */
  .theatre .replay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;}
  .theatre .screenwrap.ended .replay{display:flex;}
  .theatre .replay span{background:rgba(0,0,0,.62);color:#fff;font-size:11px;font-weight:700;
    padding:5px 10px;border-radius:999px;}
  .tcta{margin-top:12px;}

  /* ===== OPTION 4 "व्योम साथी" — conversational character narrates the page (with voice) ===== */
  .chatwrap{position:absolute;top:76px;left:0;right:0;bottom:0;overflow-y:auto;padding:14px 16px 24px;}
  .chathead{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--neutral200);}
  .soundpill{margin-left:auto;flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;font-family:inherit;
    background:var(--baseWhite);border:1px solid var(--neutral200);border-radius:999px;padding:7px 12px;
    font-size:12px;font-weight:700;color:var(--neutral900);cursor:pointer;}
  .soundpill.off{color:var(--neutral500);font-weight:600;}
  .avatar{width:60px;height:60px;flex:0 0 auto;animation:bob 3.2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  .avatar .eye{transform-origin:center;transform-box:fill-box;animation:blink 4.6s infinite;}
  @keyframes blink{0%,92%,100%{transform:scaleY(1);}95%{transform:scaleY(.12);}}
  .chathead .who b{display:block;font-size:16px;font-weight:700;color:var(--neutral900);}
  .chathead .who span{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--positive600);font-weight:600;margin-top:2px;}
  .chathead .who span i{width:7px;height:7px;border-radius:50%;background:var(--positive600);display:block;}
  .bubble{max-width:86%;background:var(--baseWhite);border:1px solid var(--neutral200);
    border-radius:4px 16px 16px 16px;padding:11px 14px;margin-top:10px;font-size:14.5px;line-height:1.55;color:var(--neutral900);
    opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease;}
  .bubble.in{opacity:1;transform:none;}
  .bubble b{font-weight:700;}
  .bubble.tv{background:var(--brand100);border-color:var(--brand300);}
  .bubble.prev{max-width:100%;width:100%;background:var(--brand100);border-color:var(--brand300);}
  .prevlink{display:block;text-decoration:none;margin-top:9px;}
  .bubble.prev .screenwrap{margin-top:0;}
  .bubble.prev .tcta{margin-top:10px;}
  /* quick replies attached to a bubble (user-reply side = right) */
  .replies{display:flex;flex-direction:column;align-items:flex-end;gap:8px;margin-top:10px;
    opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease;}
  .replies.in{opacity:1;transform:none;}
  .rchip{font-family:inherit;cursor:pointer;border-radius:999px;padding:10px 16px;font-size:13.5px;
    background:var(--baseWhite);}
  .rchip.main{border:1.5px solid var(--brand600);color:var(--brand600);font-weight:700;}
  .rchip.ghost{border:1px solid var(--neutral200);color:var(--neutral700);font-weight:400;}
</style>
</head>
<body>
  <div class="viewport" id="vp"></div>

<script>
  const TV_URL = "https://wiom.tv";

  /* real wiom.tv channel streams — fallback chain ordered by STABILITY:
     ranked on 14d live analytics (playback_start/error/stall rates per channel, wiom.tv analytics.db)
     + probed from this origin (CORS, manifest→variant→segment chain, latency). Dangal TV = most-watched
     AND most stable (71% start rate, Akamai, fastest fetch chain). */
  const STREAMS = [
    { n:"Dangal TV",   u:"https://live-dangal.akamaized.net/liveabr/playlist.m3u8" },
    { n:"Dangal 2",    u:"https://live-dangal2.akamaized.net/liveabr/playlist.m3u8" },
    { n:"NDTV India",  u:"https://ndtvindiaelemarchana.akamaized.net/hls/live/2003679/ndtvindia/master.m3u8" }
  ];

  /* copy = verbatim from live app's new_language_data.json (hi), LOCATION_UNSERVICEABLE_* */
  const COPY = {
    area:{ title:"हम अभी आपके इलाके में उपलब्ध नहीं हैं", addr:true,
           button:"ये मेरे इलाके की लोकेशन नहीं है" },
    city:{ title:"जल्दी ही व्योम आपके<br>शहर में उपलब्ध हो जाएगे",
           subtitle:"हम हर महीने एक नए शहर मे व्योम नेट लगा रहे है<br>आपके शहर मे आते ही आपको बता दिया जाएगा",
           button:"किसी और जगह के लिए चेक करें" },
    searched:{ title:"जल्द आ रहा है व्योम!",
           subtitle:"हम अभी आपके इलाके में उपलब्ध नहीं हैं",
           button:"किसी और जगह के लिए चेक करें" }
  };
  const LOGIN_CTA = "पहले से व्योम लगा हुआ है";
  const ADDR = { nm:"Rajouri Garden", ad:"Rajouri Garden, New Delhi, Delhi 110027, India" };
  const TV = { lbl:"तब तक के लिए", h:"व्योम TV — 100% फ्री", sub:"ढेरों लाइव चैनल • न्यूज़ • मूवी • भक्ति", see:"देखें ›" };

  /* chat script (Option 4) — beat 1 varies by variant; beats 2-3 shared */
  const CHAT = {
    area:[ `नमस्ते! 🙏 माफ़ कीजिए — हम अभी <b>${ADDR.nm}</b> तक नहीं पहुँचे हैं`,
           `जैसे ही व्योम नेट आपके इलाके में आएगा, हम आपको खुद बता देंगे` ],
    city:[ `नमस्ते! 🙏 हम अभी आपके शहर नहीं पहुँचे हैं — पर जल्द आ रहे हैं!`,
           `हम हर महीने एक नए शहर में व्योम नेट लगा रहे हैं — आपके शहर आते ही खुद बता देंगे` ],
    searched:[ `नमस्ते! 🙏 जल्द आ रहा है व्योम — अभी हम आपके इलाके में उपलब्ध नहीं हैं`,
           `जैसे ही व्योम नेट यहाँ आएगा, हम आपको खुद बता देंगे` ]
  };
  const CHAT_TV = `पर तब तक बोर क्यों होना? <b>व्योम TV</b> पर ढेरों लाइव चैनल — बिल्कुल <b>फ्री</b> 📺`;
  const CHAT_PREV = `ये देखिए — अभी <b>लाइव</b> चल रहा है 👇`;

  /* options — selection screen is English; the mock itself stays Hindi (real app copy) */
  const OPTIONS = [
    { key:'toast', name:'Option 1 · Toast', badge:'final',
      desc:'The screen stays exactly as it is. After 1 second a "तब तक के लिए" toast slides up from the bottom — the whole toast is tappable, ✕ dismisses it.' },
    { key:'footer', name:'Option 2 · Footer Button', badge:'final',
      desc:'The strong pink button moves up right under the message (message → action in one glance). After 2 seconds the whole footer slides in as one big button.' },
    { key:'theatre', name:'Option 3 · Live Embed', badge:'newc',
      desc:'BUILD SPEC. The screen condenses but keeps its centered layout (message stays #1); a "तब तक के लिए" band sits below, present from first paint — it never slides in. Inside it a framed window shows REAL wiom.tv live TV playing, muted, over a local poster that is always there (so it is never a black box). Stops at ~25s → tap to replay.' },
    { key:'saathi', name:'Option 4 · Wiom Saathi', badge:'newc',
      desc:'A friendly Wiom character presents the page as a chat — the whole story lands in one go, and the character narrates it ALOUD (🔊 toggle). The news comes first with its own reply chip, then a live playing Wiom TV preview right inside the chat.' },
    { key:'before', name:'Current App', badge:'base',
      desc:'Today\'s production screen, for comparison — no Wiom TV entry.' }
  ];
  const BADGE_LABEL = { final:'FINAL', newc:'NEW', base:'Baseline' };

  const statusbar=()=>`<div class="statusbar"><span>4:35</span><span class="r"><span>📶</span><span>🔋50%</span></span></div>`;
  const appbar=()=>`<div class="appbar"><span class="back">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></span></div>`;
  const tvframe=()=>`<div class="tvframe">
      <div class="mosaic"><span></span><span></span><span></span><span></span></div>
      <div class="live"><i></i>LIVE</div>
      <div class="play"><b><span class="playtri"></span></b></div>
    </div>`;

  /* cartoon Wiom person (flat style, matches the screen graphic's art direction) */
  const avatar=()=>`<svg class="avatar" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="32" fill="#FFE5F6"/>
      <path d="M12 64c1.5-11 9.5-17 20-17s18.5 6 20 17" fill="#D9008D"/>
      <path d="M26 47h12v6c0 3.3-2.7 6-6 6s-6-2.7-6-6v-6z" fill="#EDB98A"/>
      <circle cx="32" cy="30" r="13.5" fill="#F5C9A0"/>
      <path d="M18.5 28.5C18.5 20 24 14.5 32 14.5S45.5 20 45.5 28.5c0-2-1-4.5-2.5-5.5-.6 1.2-1.6 2-3 2.4-3.4 1-8.6 1-12 0-1.4-.4-2.4-1.2-3-2.4-1.5 1-3 3.5-3 5.5z" fill="#2B2333"/>
      <ellipse class="eye" cx="27" cy="30" rx="1.7" ry="2.1" fill="#2B2333"/>
      <ellipse class="eye" cx="37" cy="30" rx="1.7" ry="2.1" fill="#2B2333"/>
      <path d="M28 36.5c1.2 1.6 2.6 2.3 4 2.3s2.8-.7 4-2.3" stroke="#2B2333" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="32" cy="55" r="3.2" fill="#FAF9FC"/>
      <path d="M30.6 55l1 1.1 1.9-2.2" stroke="#D9008D" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>`;

  const contentFor=(c)=>`
     <div class="gfx"><img src="assets/location_unserviceable_graphic.svg" alt=""></div>
     <div class="title">${c.title}</div>
     ${c.addr
       ? `<div class="addrcard"><img src="assets/location_pin.svg" alt=""><div><div class="nm">${ADDR.nm}</div><div class="ad">${ADDR.ad}</div></div></div>`
       : `<div class="subtitle">${c.subtitle}</div>`}`;

  const addrcard=()=>`<div class="addrcard"><img src="assets/location_pin.svg" alt=""><div><div class="nm">${ADDR.nm}</div><div class="ad">${ADDR.ad}</div></div></div>`;

  let screen='menu', view=null, variant='area', timing='delayed';
  let timers=[], hlsPlayer=null;
  const viewed=new Set();

  const later=(fn,ms)=>timers.push(setTimeout(fn,ms));
  function clearTimers(){ timers.forEach(clearTimeout); timers=[]; }
  function stopTv(){ if(hlsPlayer){ try{hlsPlayer.destroy();}catch(e){} hlsPlayer=null; } }

  /* ===== voice narration (Option 4): device TTS, hi-IN, synced to the typing ===== */
  let speechOn=true, voiceHi=null;
  function pickVoice(){ if(!window.speechSynthesis) return;
    const vs=speechSynthesis.getVoices();
    voiceHi=vs.find(v=>/^hi[-_]/i.test(v.lang))||vs.find(v=>/hindi/i.test(v.name))||null; }
  if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
  function stopSpeech(){ if(window.speechSynthesis){ try{speechSynthesis.cancel();}catch(e){} } }
  const plainText=h=>h.replace(/<[^>]+>/g,'').replace(/[\u{1F000}-\u{1FAFF}\u{2190}-\u{27BF}\u{FE0F}\u{200D}]/gu,'').trim();
  /* Queue the whole story as one utterance sequence, SYNCHRONOUSLY inside the tap's call stack —
     iOS WebKit blocks speech started later from timers (why v1 audio was silent on iPhone). */
  function narrate(texts){
    if(!speechOn||!window.speechSynthesis) return;
    try{
      if(speechSynthesis.speaking||speechSynthesis.pending) speechSynthesis.cancel();
      texts.forEach(t=>{
        const u=new SpeechSynthesisUtterance(plainText(t));
        u.lang='hi-IN'; if(voiceHi) u.voice=voiceHi; u.rate=1.03;
        speechSynthesis.speak(u);
      });
    }catch(e){}
  }

  /* Bounded data: stop the stream after ~25s and fall back to the poster + a replay tap.
     Worst case is a few MB, not an open-ended stream on users who have no Wiom net.
     Option 4's chat preview has no #tvscreen, so it is unaffected. */
  const TV_CAP_MS = 25000;
  function capTv(){
    const sc=document.getElementById('tvscreen'); if(!sc) return;
    later(()=>{ stopTv();
      const v=document.getElementById('tvvid'); if(v) v.classList.remove('on');
      sc.classList.remove('playing'); sc.classList.add('ended'); }, TV_CAP_MS);
  }

  /* ===== live wiom.tv player (Option 3): try real channel streams in order ===== */
  function startTv(){
    const v=document.getElementById('tvvid'); if(!v) return;
    v.muted=true;
    let i=0;
    const fail=()=>{ i++; if(i<STREAMS.length){ tryStream(); } else {
      const h=document.getElementById('loadhint'); if(h) h.textContent="व्योम TV — लाइव चैनल"; } };
    const ok=(name)=>{ v.play().catch(()=>{});
      const cn=document.getElementById('chname'), h=document.getElementById('loadhint');
      if(cn) cn.textContent=name; if(h) h.style.display='none';
      v.classList.add('on');   /* fade in OVER the local poster — the poster never disappears */
      const sc=document.getElementById('tvscreen'); if(sc) sc.classList.add('playing');
      capTv(); };
    const tryStream=()=>{
      const s=STREAMS[i];
      if(window.Hls && Hls.isSupported()){
        stopTv();
        hlsPlayer=new Hls({maxBufferLength:12});
        hlsPlayer.loadSource(s.u); hlsPlayer.attachMedia(v);
        hlsPlayer.on(Hls.Events.MANIFEST_PARSED,()=>ok(s.n));
        hlsPlayer.on(Hls.Events.ERROR,(e,d)=>{ if(d.fatal) fail(); });
      } else if(v.canPlayType('application/vnd.apple.mpegurl')){ /* iOS Safari native HLS */
        v.src=s.u; v.onerror=fail; v.onloadedmetadata=()=>ok(s.n);
      } else { fail(); }
    };
    if(window.Hls || v.canPlayType('application/vnd.apple.mpegurl')) tryStream();
    else { later(startTv,400); } /* hls.js still loading (defer) */
  }

  /* ===== selection screen ===== */
  function renderMenu(){
    clearTimers(); stopTv(); stopSpeech();
    const vp=document.getElementById('vp');
    vp.className='viewport';
    const nextKey=OPTIONS.find(o=>!viewed.has(o.key))?.key;
    const allDone=OPTIONS.every(o=>viewed.has(o.key));

    vp.innerHTML=`<div class="menu">
      <div class="kick">Wiom TV Entry · Prototype</div>
      <h1>Pick an option,<br>see it full-screen</h1>
      <div class="sub">The two final designs plus two new concepts for the Wiom TV entry on the unserviceable screen. Tap an option and the screen becomes that design — when you're done, the other options are shown again.</div>
      <div class="cards">
        ${OPTIONS.map(o=>`
          <button class="card ${viewed.has(o.key)?'viewed':''} ${(!viewed.has(o.key)&&o.key===nextKey&&viewed.size>0)?'next':''}" data-k="${o.key}">
            <div class="row1">
              <span class="nm">${o.name}</span>
              <span class="badge ${o.badge}">${BADGE_LABEL[o.badge]}</span>
              ${viewed.has(o.key)?`<span class="badge done">✓ Viewed</span>`:''}
            </div>
            <div class="desc">${o.desc}</div>
            <div class="go">${viewed.has(o.key)?'View again':'View'} ›</div>
          </button>`).join('')}
      </div>
      ${allDone?`<div class="alldone">✓ All options viewed — finals: Option 1 (Toast) + Option 2 (Footer Button) · new concepts: Option 3 (Live Embed) + Option 4 (Wiom Saathi)</div>`
               :`<div class="hint">Inside each option you can also switch the एरिया / शहर / सर्च variants</div>`}
    </div>`;

    vp.querySelectorAll('.card').forEach(el=>{
      el.onclick=()=>{ view=el.dataset.k; screen='view'; render(); };
    });
  }

  /* ===== option experience ===== */
  const viewChrome=(o,extra='')=>`
    <button class="exit" id="exit"><span class="b">‹</span> All options</button>
    <div class="nav"><div class="navseg" id="varseg">
      <button data-v="area" class="${variant==='area'?'on':''}">एरिया</button>
      <button data-v="city" class="${variant==='city'?'on':''}">शहर</button>
      <button data-v="searched" class="${variant==='searched'?'on':''}">सर्च</button>
    </div>${extra}</div>
    <button class="nextprompt" id="nextprompt">✓ Seen ${o.name.split(' · ')[0]} — <span class="b">other options ›</span></button>`;

  const timingSeg=()=>`<div class="navseg" id="timeseg">
      <button data-t="delayed" class="${timing==='delayed'?'on':''}">Delayed</button>
      <button data-t="instant" class="${timing==='instant'?'on':''}">Instant</button>
    </div>`;

  function renderView(){
    clearTimers(); stopTv(); stopSpeech();
    const c=COPY[variant];
    const o=OPTIONS.find(x=>x.key===view);
    const vp=document.getElementById('vp');
    vp.className='viewport';

    if(view==='footer'){
      /* FINAL फ़ुटर बटन (K2): strong button under the message; whole footer = one button, arrives at 2s */
      vp.innerHTML = viewChrome(o)+statusbar()+appbar()+
        `<div class="body k2mode">${contentFor(c)}
           <button class="pribtn strong inbody">${c.button}</button>
           <div class="loginlink">${LOGIN_CTA} <span class="arr">›</span></div>
         </div>
         <a class="k2bar" href="${TV_URL}">
           <div class="lbl">${TV.lbl}</div>
           <div class="k2row">${tvframe()}<div class="k2t"><b>${TV.h}</b><span>${TV.sub}</span></div><span class="see">${TV.see}</span></div>
         </a>`;
      later(()=>vp.classList.add('k2in'),2000);

    } else if(view==='theatre'){
      /* OPTION 3 लाइव एम्बेड: condensed zone 1 (message stays #1) + dark theatre band with REAL wiom.tv playing */
      vp.classList.add('vtheatre');
      vp.innerHTML = viewChrome(o)+statusbar()+appbar()+
        `<div class="body tmode">
           <div class="gfx md"><img src="assets/location_unserviceable_graphic.svg" alt=""></div>
           <div class="title compact">${c.title}</div>
           ${c.addr?addrcard():`<div class="subtitle compact">${c.subtitle}</div>`}
           <button class="pribtn strong inbody">${c.button}</button>
           <div class="loginlink">${LOGIN_CTA} <span class="arr">›</span></div>
         </div>
         <a class="theatre" href="${TV_URL}">
           <div class="tlabel">${TV.lbl}</div>
           <div class="thead"><b>व्योम TV</b><span class="freepill">🎁 100% फ्री</span></div>
           <div class="tstage">
             <div class="screenwrap" id="tvscreen">
               <div class="poster"><i></i><i></i><i></i><i></i><i></i><i></i></div>
               <video id="tvvid" muted autoplay playsinline></video>
               <div class="live2"><i></i>LIVE</div>
               <div class="replay" id="tvreplay"><span>▶ फिर से देखें</span></div>
             </div>
             <div class="tmeta"><b>ढेरों लाइव चैनल</b>
               <span>न्यूज़ • मूवी • भक्ति • मनोरंजन • खेल</span></div>
           </div>
           <span class="pribtn strong tcta">फ्री में देखना शुरू करें</span>
         </a>`;
      vp.classList.add('tin');   /* present at first paint — never animated in */
      /* Reserve exactly the band's real height: it is now content-sized (framed preview),
         not --tvh-sized, so the old calc() left a dead gap. Runs synchronously before paint. */
      { const th=vp.querySelector('.theatre'), bd=vp.querySelector('.body.tmode');
        if(th&&bd) bd.style.bottom=(th.offsetHeight+16)+'px'; }
      startTv();
      /* replay lives inside the band's <a>, so it must not navigate */
      const rp=document.getElementById('tvreplay');
      if(rp) rp.onclick=(e)=>{ e.preventDefault(); e.stopPropagation();
        document.getElementById('tvscreen').classList.remove('ended'); startTv(); };

    } else if(view==='saathi'){
      /* OPTION 4 व्योम साथी: whole chat lands in one go (0.3s cascade); voice narrates over it.
         narrate() runs HERE, synchronously in the tap's call stack — required for iOS audio. */
      const beats=[...CHAT[variant], CHAT_TV, CHAT_PREV];
      const dly=i=>`style="transition-delay:${i*80}ms"`;
      vp.innerHTML = viewChrome(o)+statusbar()+appbar()+
        `<div class="chatwrap" id="chatwrap">
           <div class="chathead">${avatar()}<div class="who"><b>व्योम साथी</b><span><i></i>ऑनलाइन</span></div>
             <button class="soundpill ${speechOn?'':'off'}" id="soundpill">${speechOn?'🔊 आवाज़':'🔇 आवाज़'}</button></div>
           <div class="bubble" id="b0" ${dly(0)}>${beats[0]}</div>
           <div class="replies" id="r0" ${dly(1)}>
             <button class="rchip main">${c.button}</button>
             <button class="rchip ghost">${LOGIN_CTA} ›</button>
           </div>
           <div class="bubble" id="b1" ${dly(2)}>${beats[1]}</div>
           <div class="bubble tv" id="b2" ${dly(3)}>${beats[2]}</div>
           <div class="bubble prev" id="b3" ${dly(4)}>${beats[3]}
             <a class="prevlink" href="${TV_URL}">
               <div class="screenwrap">
                 <video id="tvvid" muted autoplay playsinline></video>
                 <div class="loadhint" id="loadhint">चैनल लोड हो रहा है…</div>
                 <div class="live2"><i></i>LIVE</div>
                 <div class="chname" id="chname"></div>
               </div>
               <span class="pribtn strong tcta">फ्री में देखना शुरू करें</span>
             </a>
           </div>
         </div>`;

      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        ['b0','r0','b1','b2','b3'].forEach(id=>document.getElementById(id).classList.add('in'));
      }));
      startTv();
      narrate(beats);
      later(()=>vp.classList.add('promptin'),5000);

      const sp=document.getElementById('soundpill');
      sp.onclick=()=>{ speechOn=!speechOn;
        if(!speechOn) stopSpeech(); else narrate(beats); /* click = fresh gesture, restarts narration */
        sp.textContent=speechOn?'🔊 आवाज़':'🔇 आवाज़'; sp.classList.toggle('off',!speechOn); };

    } else {
      /* अभी का ऐप + FINAL टोस्ट (D): production screen (pinned bar); toast adds the 1s "तब तक के लिए" snackbar */
      vp.innerHTML = viewChrome(o)+statusbar()+appbar()+
        `<div class="body">${contentFor(c)}</div>
         <div class="bottombar">
           <button class="pribtn">${c.button}</button>
           <div class="loginlink">${LOGIN_CTA} <span class="arr">›</span></div>
         </div>
         ${view==='toast'?`<a class="snack" href="${TV_URL}" id="snack">${tvframe()}
             <div class="qt"><span class="slbl">${TV.lbl}</span><b>${TV.h}</b><span>${TV.sub}</span></div>
             <span class="go">${TV.see}</span><span class="x" id="snackx">✕</span></a>`:''}`;
      if(view==='toast') later(()=>vp.classList.add('snackin'),1000);
      const x=document.getElementById('snackx');
      if(x) x.onclick=(e)=>{e.preventDefault();e.stopPropagation();vp.classList.remove('snackin');};
    }

    /* view "ends": after the animation has played + reading time, offer the other options.
       saathi paces itself off the narration — its chain adds the prompt when the story finishes. */
    if(view!=='saathi'){
      const promptDelay = view==='footer'?7000 : view==='theatre'?8000 : 6000;
      later(()=>vp.classList.add('promptin'), promptDelay);
    }

    const back=()=>{ viewed.add(view); screen='menu'; render(); };
    document.getElementById('exit').onclick=back;
    document.getElementById('nextprompt').onclick=back;
    document.getElementById('varseg').onclick=(e)=>{const v=e.target.dataset.v;if(v){variant=v;renderView();}};
  }

  function render(){ screen==='menu' ? renderMenu() : renderView(); }
  render();
</script>
</body>
</html>
