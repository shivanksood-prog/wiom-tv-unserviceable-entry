<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiom TV · Unserviceable Entry — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --brand700:#F00CA0; --brand600:#D9008D; --brand300:#FFB2E4; --brand200:#FFCCED; --brand100:#FFE5F6;
    --neutral900:#161021; --neutral800:#352D42; --neutral700:#665E75; --neutral500:#A7A1B2;
    --neutral300:#D7D3E0; --neutral200:#E8E4F0; --neutral100:#F1EDF7; --white:#FAF9FC; --baseWhite:#FFFFFF;
    --positive600:#008043; --positive100:#E1FAED;
    --gold1:#D5AF4A; --gold2:#F2E983; --gold3:#D5B14B;
    --bgDark:#161021; --radius:16px;
  }
  @font-face{font-family:'NotoSansDisplay';src:url('assets/NotoSansDisplay-Regular.ttf');font-weight:400;}
  @font-face{font-family:'NotoSansDisplay';src:url('assets/NotoSansDisplay-SemiBold.ttf');font-weight:600;}
  @font-face{font-family:'NotoSansDisplay';src:url('assets/NotoSansDisplay-Bold.ttf');font-weight:700;}

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Noto Sans Devanagari','NotoSansDisplay',system-ui,sans-serif;
    background:#33373d; color:var(--neutral900);
    min-height:100vh; padding:22px 12px 60px; display:flex; flex-direction:column; align-items:center;
  }

  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
  .seg{display:inline-flex;background:#21242a;border-radius:12px;padding:4px;gap:2px;}
  .seg button{font-family:inherit;font-size:13px;font-weight:600;color:#cfd2da;background:transparent;
    border:0;padding:8px 13px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .seg button.active{background:var(--brand600);color:#fff;}
  .seg.design button.active{background:var(--brand700);}
  .hint{color:#9aa0ab;font-size:12px;text-align:center;max-width:780px;margin:10px auto 16px;line-height:1.55;}
  .hint code{color:#e3a7d2;}
  .hint b{color:#e9ecf2;}

  .stage{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
  .phone-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .phone-label{color:#cfd2da;font-size:12px;font-weight:600;letter-spacing:.3px;}
  .phone{width:360px;height:720px;background:var(--bgDark);border-radius:28px;overflow:hidden;position:relative;
    box-shadow:0 18px 50px rgba(0,0,0,.45);border:1px solid #0c0a12;}

  .statusbar{position:absolute;top:0;left:0;right:0;height:28px;display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;font-size:12px;color:#fff;z-index:6;font-family:'NotoSansDisplay',sans-serif;}
  .statusbar .r{display:flex;gap:6px;align-items:center;}

  .hero{position:absolute;top:0;left:0;right:0;height:380px;z-index:1;}
  .hero img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
  .hero .topscrim{position:absolute;top:0;left:0;right:0;height:100px;background:linear-gradient(to bottom, rgba(22,16,33,.6), rgba(22,16,33,0));}
  .hero .botfade{position:absolute;left:0;right:0;bottom:0;height:240px;background:linear-gradient(to top, #161021 18%, rgba(22,16,33,0));}
  .belowfill{position:absolute;top:380px;left:0;right:0;bottom:0;background:var(--bgDark);z-index:1;}

  .appbar{position:absolute;top:28px;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:flex-end;gap:14px;padding:0 16px;z-index:6;}
  .appbar .ic{width:26px;height:26px;color:#fff;display:flex;align-items:center;justify-content:center;}

  .content{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:0 0 16px;display:flex;flex-direction:column;}
  .copyblock{padding:0 16px;text-align:center;}
  .title{color:var(--white);font-size:24px;font-weight:700;line-height:1.3;}
  .subtitle{color:var(--white);font-size:16px;font-weight:400;line-height:1.5;margin-top:14px;opacity:.92;}

  /* ============ Wiom TV promo card — 3 readdressed variants ============ */
  .tvslot{margin:18px 16px 4px;}

  /* shared bits */
  .freepill{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:12px;
    padding:4px 10px;border-radius:999px;line-height:1;white-space:nowrap;}
  .tvlogo{flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-weight:700;
    font-family:'NotoSansDisplay',sans-serif;text-align:center;}
  .playdot{width:0;height:0;border-style:solid;border-width:7px 0 7px 12px;border-color:transparent transparent transparent currentColor;margin-left:2px;}

  /* ---- V1: Bold Pink hero ---- */
  .v1{background:linear-gradient(135deg,#D9008D,#F00CA0);border-radius:var(--radius);padding:16px;
    box-shadow:0 10px 28px rgba(217,0,141,.45);color:#fff;}
  .v1 .top{display:flex;align-items:center;gap:12px;}
  .v1 .tvlogo{width:52px;height:52px;border-radius:13px;background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.35);color:#fff;font-size:13px;line-height:1.05;}
  .v1 .ttl{font-size:18px;font-weight:700;line-height:1.25;color:#fff;}
  .v1 .freepill{background:#fff;color:var(--brand600);margin-top:7px;}
  .v1 .sub{font-size:13px;line-height:1.45;margin-top:12px;color:rgba(255,255,255,.95);}
  .v1 .cta{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:13px;background:#fff;color:var(--brand600);
    font-weight:700;font-size:15px;padding:12px;border-radius:12px;text-decoration:none;}

  /* ---- V2: Clean white, inline green FREE eyebrow ---- */
  .v2{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:0 6px 22px rgba(0,0,0,.32);}
  .v2 .freepill{background:var(--positive100);color:var(--positive600);}
  .v2 .row{display:flex;align-items:center;gap:12px;margin-top:11px;}
  .v2 .tvlogo{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#D9008D,#F00CA0);color:#fff;
    font-size:12px;line-height:1.05;box-shadow:0 3px 10px rgba(217,0,141,.4);}
  .v2 .ttl{font-size:16px;font-weight:700;color:var(--neutral900);line-height:1.3;}
  .v2 .sub{font-size:13px;color:var(--neutral700);line-height:1.45;margin-top:3px;}
  .v2 .cta{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;background:var(--brand100);
    color:var(--brand600);font-weight:700;font-size:15px;padding:11px;border-radius:12px;text-decoration:none;border:1px solid var(--brand200);}

  /* ---- V3: Spotlight dark card, gold FREE + play ---- */
  .v3{background:var(--neutral800);border:1px solid #4a3f5c;border-radius:var(--radius);padding:14px;
    box-shadow:0 10px 26px rgba(0,0,0,.5);position:relative;overflow:hidden;}
  .v3:before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:linear-gradient(180deg,#D5AF4A,#F2E983,#D5B14B);}
  .v3 .row{display:flex;align-items:center;gap:12px;}
  .v3 .tvlogo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#D9008D,#F00CA0);color:#fff;
    font-size:13px;line-height:1.05;position:relative;}
  .v3 .tvlogo .play{position:absolute;right:-3px;bottom:-3px;width:22px;height:22px;border-radius:50%;background:#fff;color:var(--brand600);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .v3 .ttl{font-size:16px;font-weight:700;color:#fff;line-height:1.3;}
  .v3 .freepill{background:linear-gradient(135deg,#D5AF4A,#F2E983,#D5B14B);color:#3a2d00;margin-bottom:6px;}
  .v3 .sub{font-size:13px;color:var(--neutral300);line-height:1.45;margin-top:3px;}
  .v3 .cta{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:13px;background:var(--brand600);color:#fff;
    font-weight:700;font-size:15px;padding:12px;border-radius:12px;text-decoration:none;}

  .btns{padding:14px 16px 0;}
  .pribtn{display:block;width:100%;background:var(--brand600);color:var(--white);font-weight:700;font-size:16px;
    border:0;padding:14px 16px;border-radius:var(--radius);cursor:pointer;font-family:inherit;text-align:center;}
  .seclink{display:flex;align-items:center;justify-content:center;gap:4px;color:var(--white);font-size:14px;font-weight:600;padding:14px 0 4px;}

  .ring .tvslot>div{outline:2px dashed var(--brand300);outline-offset:4px;}
  @media(max-width:780px){.phone{transform:scale(.92);}}
</style>
</head>
<body>

  <div class="controls">
    <div class="seg design" id="designSeg">
      <button data-d="1" class="active">डिज़ाइन 1 · Bold Pink</button>
      <button data-d="2">डिज़ाइन 2 · Clean White</button>
      <button data-d="3">डिज़ाइन 3 · Spotlight</button>
    </div>
  </div>
  <div class="controls">
    <div class="seg" id="variantSeg">
      <button data-v="area" class="active">क्षेत्र में नहीं (AREA)</button>
      <button data-v="city">शहर में नहीं (CITY)</button>
    </div>
    <div class="seg" id="viewSeg">
      <button data-view="after" class="active">After (with TV)</button>
      <button data-view="before">Before</button>
      <button data-view="both">Compare</button>
    </div>
  </div>
  <p class="hint">
    Live <code>UnAvailableInArea</code> screen, real Wiom tokens. <b>Free-TV led</b> copy; the FREE tag now sits inline (no overlap).
    Pick a design above · toggle AREA/CITY · Before/After. CTA → <b>wiom.tv</b>.
  </p>

  <div class="stage" id="stage"></div>

<script>
  const COPY = {
    area:{title:"जल्द आ रहा है व्योम!", subtitle:"हम अभी आपके एरिया में उपलब्ध नहीं हैं",
          button:"किसी और पते पर बुकिंग करें", seclink:"पहले से व्योम लगा हुआ है"},
    city:{title:"2-3 महीने में आ रहा है व्योम!", subtitle:"हम अभी आपके शहर में उपलब्ध नहीं हैं",
          button:"किसी और जगह के लिए चेक करें", seclink:"पहले से व्योम लगा हुआ है"}
  };

  // Free-TV-forward copy, shared across area/city
  const TV = {
    free:"100% फ्री",
    ttl:"मुफ़्त लाइव TV, अभी देखें",
    sub:"नेट का इंतज़ार? तब तक व्योम TV पर ढेरों लाइव चैनल — बिना एक रुपया खर्च किए, इसी फोन पर।",
    cta:"फ्री TV देखें",
    href:"https://wiom.tv"
  };

  function statusbar(){return `<div class="statusbar"><span>4:35</span><span class="r"><span>📶</span><span>🔋50%</span></span></div>`;}
  function appbar(){return `<div class="appbar">
    <div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12a8 8 0 0116 0v4a3 3 0 01-3 3M4 12v4a3 3 0 003 3h1M4 12h3v6H6a2 2 0 01-2-2M20 12h-3v6h1a2 2 0 002-2"/></svg></div>
    <div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h7M6.5 5v2c0 3-1.5 5.5-4 7M4 9c0 2 2 4 5 5M12 20l4-9 4 9M13.5 17h5"/></svg></div></div>`;}

  function card(design){
    if(design===1) return `<div class="v1">
        <div class="top">
          <div class="tvlogo">व्योम<br>TV</div>
          <div><div class="ttl">${TV.ttl}</div><span class="freepill">🎉 ${TV.free}</span></div>
        </div>
        <div class="sub">${TV.sub}</div>
        <a class="cta" href="${TV.href}" target="_blank" rel="noopener"><span class="playdot"></span>${TV.cta}</a>
      </div>`;
    if(design===2) return `<div class="v2">
        <span class="freepill">🎉 ${TV.free}</span>
        <div class="row">
          <div class="tvlogo">व्योम<br>TV</div>
          <div><div class="ttl">${TV.ttl}</div><div class="sub">${TV.sub}</div></div>
        </div>
        <a class="cta" href="${TV.href}" target="_blank" rel="noopener"><span class="playdot"></span>${TV.cta}</a>
      </div>`;
    return `<div class="v3">
        <div class="row">
          <div class="tvlogo">व्योम<br>TV<span class="play"><span class="playdot" style="border-width:5px 0 5px 8px"></span></span></div>
          <div><span class="freepill">⭐ ${TV.free}</span><div class="ttl">${TV.ttl}</div><div class="sub">${TV.sub}</div></div>
        </div>
        <a class="cta" href="${TV.href}" target="_blank" rel="noopener"><span class="playdot"></span>${TV.cta}</a>
      </div>`;
  }

  function screen(variant, withTV, ring, design){
    const c = COPY[variant];
    return `<div class="phone ${ring?'ring':''}">
      ${statusbar()}${appbar()}
      <div class="hero"><img src="assets/unserviceable.jpg" alt=""><div class="topscrim"></div><div class="botfade"></div></div>
      <div class="belowfill"></div>
      <div class="content">
        <div class="copyblock"><div class="title">${c.title}</div><div class="subtitle">${c.subtitle}</div></div>
        ${withTV?`<div class="tvslot">${card(design)}</div>`:''}
        <div class="btns"><button class="pribtn">${c.button}</button><div class="seclink">${c.seclink} &#8250;</div></div>
      </div></div>`;
  }

  let variant='area', view='after', design=1;
  function render(){
    const stage=document.getElementById('stage');
    if(view==='both'){
      stage.innerHTML =
        `<div class="phone-wrap"><div class="phone-label">BEFORE — current app</div>${screen(variant,false,false,design)}</div>`+
        `<div class="phone-wrap"><div class="phone-label">AFTER — design ${design}</div>${screen(variant,true,true,design)}</div>`;
    }else{
      const withTV = view==='after';
      stage.innerHTML = `<div class="phone-wrap"><div class="phone-label">${withTV?'AFTER — design '+design:'BEFORE — current app'}</div>${screen(variant,withTV,withTV,design)}</div>`;
    }
  }
  function wire(id,attr,set){document.getElementById(id).addEventListener('click',e=>{
    const v=e.target.dataset[attr]; if(v===undefined)return; set(v);
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('active',b===e.target)); render();});}
  wire('designSeg','d',v=>design=+v);
  wire('variantSeg','v',v=>variant=v);
  wire('viewSeg','view',v=>view=v);
  render();
</script>
</body>
</html>
